version: "3.9"

# Production overrides — use with:
# docker compose -f ../docker-compose.yml -f docker-compose.prod.yml up -d

services:
  backend:
    build:
      target: production
    restart: always
    environment:
      NODE_ENV: production

  frontend:
    build:
      target: production
    restart: always

  data-pipeline:
    restart: always
    environment:
      PIPELINE_INTERVAL_MINUTES: 30

  postgres:
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

  redis:
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
